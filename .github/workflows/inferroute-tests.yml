name: InferRoute Tests

# Full InferRoute tests live in aks-builds/agentsave-inferroute.
# This workflow verifies the SDK core (context filter, early-exit, budget gate)
# which InferRoute's metrics emitter depends on.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SDK
        run: pip install -e ".[dev]"

      - name: Run core supervisor tests
        run: pytest tests/core/ tests/adapters/ -v --tb=short
