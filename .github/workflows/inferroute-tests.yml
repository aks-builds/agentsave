name: InferRoute Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout agentsave-inferroute
        uses: actions/checkout@v4
        with:
          repository: aks-builds/agentsave-inferroute

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run InferRoute tests
        run: pytest tests/ -v --tb=short
