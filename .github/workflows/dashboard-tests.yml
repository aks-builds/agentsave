name: Dashboard Tests

# Full dashboard integration tests live in aks-builds/agentsave-dashboard.
# This workflow verifies the SDK installs cleanly (a prerequisite for the
# dashboard backend which pip-installs agentsave as a dependency).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SDK in editable mode
        run: pip install -e ".[dev]"

      - name: Verify SDK imports cleanly
        run: python -c "from agentsave import supervise, loop; print('SDK OK')"

      - name: Run SDK tests
        run: pytest tests/ -v --tb=short
