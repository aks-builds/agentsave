name: Publish secondary packages to PyPI

# Publishes agentsave-dashboard and agentsave-inferroute using the PYPI_TOKEN
# that lives in this repo. Checks out each secondary repo, builds, and uploads.
on:
  workflow_dispatch:
    inputs:
      package:
        description: "Which package to publish"
        required: true
        default: "dashboard"
        type: choice
        options:
          - dashboard
          - inferroute
          - both

permissions:
  contents: read

jobs:
  publish-dashboard:
    if: inputs.package == 'dashboard' || inputs.package == 'both'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout agentsave-dashboard
        uses: actions/checkout@v4
        with:
          repository: aks-builds/agentsave-dashboard
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build
        run: python -m build

      - name: Verify public key in wheel
        run: |
          python3 -c "
          import zipfile, pathlib
          whl = list(pathlib.Path('dist').glob('*.whl'))[0]
          with zipfile.ZipFile(whl) as z:
              key = [n for n in z.namelist() if 'public.pem' in n]
          assert key, 'public.pem missing from wheel!'
          print(f'OK: {key[0]}')
          "

      - name: Publish agentsave-dashboard to PyPI
        run: twine upload dist/* --non-interactive
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  publish-inferroute:
    if: inputs.package == 'inferroute' || inputs.package == 'both'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout agentsave-inferroute
        uses: actions/checkout@v4
        with:
          repository: aks-builds/agentsave-inferroute
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build
        run: python -m build

      - name: Publish agentsave-inferroute to PyPI
        run: twine upload dist/* --non-interactive
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
