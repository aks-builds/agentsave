name: Bootstrap dashboard PYPI_TOKEN

# One-time workflow: copies PYPI_TOKEN from this repo to agentsave-dashboard.
# Requires APPROVER_PAT to have secrets:write on aks-builds/agentsave-dashboard.
on:
  workflow_dispatch:

jobs:
  copy-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Copy PYPI_TOKEN to agentsave-dashboard
        env:
          GH_TOKEN: ${{ secrets.APPROVER_PAT }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          # Get dashboard repo public key
          PUB_KEY_RESP=$(gh api repos/aks-builds/agentsave-dashboard/actions/secrets/public-key)
          KEY_ID=$(echo "$PUB_KEY_RESP" | jq -r '.key_id')
          KEY=$(echo "$PUB_KEY_RESP" | jq -r '.key')

          # Encrypt PYPI_TOKEN with the repo public key using sodium
          ENCRYPTED=$(python3 -c "
          import base64, os
          from cryptography.hazmat.primitives.asymmetric.x25519 import X25519PublicKey
          # Use gh CLI to set secret directly (handles encryption internally)
          print('using_gh_cli')
          ")

          # Use gh CLI to set the secret (handles libsodium encryption)
          echo "$PYPI_TOKEN" | gh secret set PYPI_TOKEN \
            --repo aks-builds/agentsave-dashboard \
            --body -
          echo "PYPI_TOKEN set in aks-builds/agentsave-dashboard"

      - name: Also copy to inferroute (for future PyPI publish)
        env:
          GH_TOKEN: ${{ secrets.APPROVER_PAT }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          echo "$PYPI_TOKEN" | gh secret set PYPI_TOKEN \
            --repo aks-builds/agentsave-inferroute \
            --body -
          echo "PYPI_TOKEN set in aks-builds/agentsave-inferroute"
